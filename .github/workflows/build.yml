name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:

  compile:
    name: Compile check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Fetch Gradle wrapper jar
        run: |
          GRADLE_VERSION="8.11.1"
          JAR_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
          mkdir -p gradle/wrapper
          curl -fsSL "$JAR_URL" -o gradle/wrapper/gradle-wrapper.jar
          # Verify the jar is non-empty
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Wrapper jar download failed or is empty, falling back to gradle wrapper task"
            # Install Gradle separately to generate the wrapper
            curl -fsSL https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            /tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version=${GRADLE_VERSION}
          fi
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile sources
        run: ./gradlew compileDebugSources --no-daemon

  build:
    name: Build APKs
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Fetch Gradle wrapper jar
        run: |
          GRADLE_VERSION="8.11.1"
          JAR_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
          mkdir -p gradle/wrapper
          curl -fsSL "$JAR_URL" -o gradle/wrapper/gradle-wrapper.jar
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            curl -fsSL https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            /tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version=${GRADLE_VERSION}
          fi

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/ScreenStream-debug-${SHORT}.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             artifacts/ScreenStream-release-unsigned-${SHORT}.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenStream-debug-${{ github.sha }}
          path: artifacts/ScreenStream-debug-*.apk
          retention-days: 30

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: ScreenStream-release-unsigned-${{ github.sha }}
          path: artifacts/ScreenStream-release-unsigned-*.apk
          retention-days: 30

  release:
    name: Signed release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Fetch Gradle wrapper jar
        run: |
          GRADLE_VERSION="8.11.1"
          JAR_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
          mkdir -p gradle/wrapper
          curl -fsSL "$JAR_URL" -o gradle/wrapper/gradle-wrapper.jar
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            curl -fsSL https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            /tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version=${GRADLE_VERSION}
          fi

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/keystore.jks
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Screen Stream ${{ github.ref_name }}
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            ## Screen Stream ${{ github.ref_name }}

            ### Install
            Download `app-release.apk` and sideload:
            ```
            adb install app-release.apk
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
